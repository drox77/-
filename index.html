<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAYLAR Shop — Stealth Edition</title>
    <style>
        :root {
            --accent: #10b981; 
            --accent-glow: rgba(16, 185, 129, 0.4);
            --bg-black: #020617;
            --border: rgba(255, 255, 255, 0.15);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-black);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            z-index: -1;
            opacity: 0.4;
            animation: float 8s infinite alternate ease-in-out;
        }
        .shape-1 { width: 300px; height: 300px; background: #10b981; top: 5%; left: 10%; }
        .shape-2 { width: 400px; height: 400px; background: #0ea5e9; bottom: 10%; right: 5%; animation-delay: -4s; }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(40px) scale(1.1); }
        }

        .container { width: 100%; max-width: 400px; z-index: 1; }

        .card {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }

        .card.neon-ready { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        h2 { text-align: center; margin: 0 0 25px 0; font-size: 28px; letter-spacing: 3px; text-shadow: 0 0 25px var(--accent-glow); }

        .tabs { display: flex; background: rgba(0,0,0,0.5); border-radius: 16px; padding: 4px; margin-bottom: 25px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 12px; transition: all 0.3s ease; font-weight: 800; font-size: 13px; color: var(--text-dim); cursor: pointer; }
        .tab.active { background: var(--accent); color: #000; }

        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        label { display: block; margin-bottom: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }
        input { width: 100%; padding: 16px; background: rgba(0,0,0,0.6); border: 1px solid var(--border); border-radius: 14px; color: #fff; font-size: 16px; margin-bottom: 5px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }

        .premium-option { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 18px; border-radius: 16px; display: flex; justify-content: space-between; margin-bottom: 10px; cursor: pointer; }
        .premium-option.selected { border-color: var(--accent); background: rgba(16, 185, 129, 0.15); }

        .price-display { text-align: center; margin: 20px 0; font-size: 34px; font-weight: 900; color: var(--accent); }

        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--accent); color: #000; }
        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Стили для экрана оплаты */
        .pay-screen { text-align: center; display: none; }
        .bank-card { background: #000; padding: 20px; border-radius: 20px; margin: 20px 0; border: 1px solid var(--accent); color: var(--accent); font-family: monospace; font-size: 18px; }
    </style>
</head>
<body>

<div class="bg-shape shape-1"></div>
<div class="bg-shape shape-2"></div>

<div class="container">
    <div class="card" id="main-card">
        
        <div id="shop-ui">
            <h2>SAYLAR SHOP</h2>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('stars', this)">ЗВЁЗДЫ</div>
                <div class="tab" onclick="switchTab('premium', this)">PREMIUM</div>
            </div>

            <label>Никнейм</label>
            <input type="text" id="username" placeholder="@nickname" oninput="validateForm()">

            <div id="stars-section" class="section active">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="stars-input" placeholder="Кол-во" oninput="calcFromStars()">
                    <input type="number" id="rub-input" placeholder="Рубли" oninput="calcFromRub()">
                </div>
                <div class="price-display"><span id="res-stars">0 ₽</span></div>
            </div>

            <div id="premium-section" class="section">
                <div class="premium-option" onclick="setPrem(3, 1000, this)"><span>3 Месяца</span> <b>1000 ₽</b></div>
                <div class="premium-option" onclick="setPrem(6, 1320, this)"><span>6 Месяцев</span> <b>1320 ₽</b></div>
                <div class="premium-option" onclick="setPrem(12, 2400, this)"><span>12 Месяцев</span> <b>2400 ₽</b></div>
                <div class="price-display"><span id="res-prem">0 ₽</span></div>
            </div>

            <button class="btn btn-main" id="pay-btn" onclick="showPayScreen()" disabled>Оформить заказ</button>
        </div>

        <div id="pay-ui" class="pay-screen">
            <h3 style="margin-top:0;">ОПЛАТИТЕ ЗАКАЗ</h3>
            <p style="color: var(--text-dim); font-size: 14px;">Переведите точную сумму на карту:</p>
            <div class="price-display" id="final-sum">0 ₽</div>
            <div class="bank-card">
                2200 7019 4219 4652<br>
                +7 966 349 22 74
            </div>
            <p style="margin-bottom: 20px;">Дамир О.</p>
            <button class="btn btn-main" id="confirm-btn" onclick="sendToBot()">Я ОПЛАТИЛ</button>
            <button style="background:none; border:none; color:var(--text-dim); margin-top:15px; cursor:pointer;" onclick="hidePayScreen()">Назад</button>
        </div>

    </div>
</div>

<script>
    let mode = 'stars';
    let pPrice = 0, pMonths = 0, totalSum = 0;
    const rate = 1.4;

    const token = '8752951278:AAHkJDobhtUhxKgwsPhyH4qMfAVwtkQH0wo';
    const chatId = '1717982615';

    function switchTab(t, el) {
        mode = t;
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(t + '-section').classList.add('active');
        validateForm();
    }

    function calcFromStars() {
        let s = document.getElementById('stars-input').value;
        document.getElementById('rub-input').value = s > 0 ? Math.ceil(s * rate) : "";
        validateForm();
    }

    function calcFromRub() {
        let r = document.getElementById('rub-input').value;
        document.getElementById('stars-input').value = r > 0 ? Math.floor(r / rate) : "";
        validateForm();
    }

    function setPrem(m, p, el) {
        pMonths = m; pPrice = p;
        document.querySelectorAll('.premium-option').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('res-prem').innerText = p + " ₽";
        validateForm();
    }

    function validateForm() {
        let user = document.getElementById('username').value;
        let rubVal = document.getElementById('rub-input').value;
        let btn = document.getElementById('pay-btn');
        let isNameOk = user.length > 2 && !/[а-яА-Я]/.test(user);
        
        if (mode === 'stars') {
            totalSum = rubVal >= 70 ? parseInt(rubVal) : 0;
            document.getElementById('res-stars').innerText = totalSum + " ₽";
            btn.disabled = !(isNameOk && totalSum >= 70);
        } else {
            totalSum = pPrice;
            btn.disabled = !(isNameOk && pPrice > 0);
        }
        document.getElementById('main-card').classList.toggle('neon-ready', !btn.disabled);
    }

    function showPayScreen() {
        document.getElementById('shop-ui').style.display = 'none';
        document.getElementById('pay-ui').style.display = 'block';
        document.getElementById('final-sum').innerText = totalSum + " ₽";
    }

    function hidePayScreen() {
        document.getElementById('shop-ui').style.display = 'block';
        document.getElementById('pay-ui').style.display = 'none';
    }

    function sendToBot() {
        const btn = document.getElementById('confirm-btn');
        btn.disabled = true;
        btn.innerText = "ОТПРАВЛЯЕМ...";

        const user = document.getElementById('username').value;
        let product = mode === 'stars' ? `${document.getElementById('stars-input').value} звёзд` : `Премиум ${pMonths} мес.`;
        const message = `💰 ЗАКАЗ!\n👤 Клиент: ${user}\n📦 Товар: ${product}\n💵 Сумма: ${totalSum} ₽`;

        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`)
            .then(res => {
                if (res.ok) {
                    alert('Заказ принят! Ждите пополнения.');
                    location.reload(); 
                } else {
                    alert('Ошибка бота. Напиши админу.');
                    btn.disabled = false;
                    btn.innerText = "Я ОПЛАТИЛ";
                }
            });
    }
</script>

</body>
</html>
