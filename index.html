<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAYLAR Shop — Telegram Auth</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* (твой полный стиль скопируй из предыдущего ответа, он не меняется) */
        :root {
            --accent: #10b981; 
            --accent-glow: rgba(16, 185, 129, 0.4);
            --bg-black: #020617;
            --border: rgba(255, 255, 255, 0.15);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --error: #ef4444;
            --gold: #fbbf24;
        }
        /* ... весь твой CSS из предыдущего кода ... */
        /* Для краткости я вставлю полный стиль из последней рабочей версии, но ты можешь взять свой */
        /* 👇 ВСТАВЬ СВОИ СТИЛИ ОТСЮДА */
        body { font-family: 'Inter', sans-serif; background: var(--bg-black); ... }
        /* ... */
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="main-card">
        <h2>SAYLAR SHOP</h2>
        <div class="tabs">
            <div class="tab active" data-tab="stars">ЗВЁЗДЫ</div>
            <div class="tab" data-tab="premium">PREMIUM</div>
            <div class="tab" data-tab="profile">ПРОФИЛЬ</div>
        </div>

        <!-- Здесь больше нет поля для ввода ника! -->

        <div id="stars-section" class="section active">
            <!-- ... тот же контент ... -->
            <div style="display: flex; gap: 10px;">
                <div style="flex:1"><label>Кол-во звёзд</label><input type="number" id="stars-input" placeholder="50"></div>
                <div style="flex:1"><label>Сумма в рублях</label><input type="number" id="rub-input" placeholder="70"></div>
            </div>
            <p style="font-size:10px;">* Минимальный заказ — 70₽ (50 звёзд)</p>
            <div class="price-display"><span id="res-stars">0 ₽</span></div>
        </div>

        <div id="premium-section" class="section">
            <div class="premium-option" data-months="3" data-price="1000"><span>3 Месяца</span> <b>1000 ₽</b></div>
            <div class="premium-option" data-months="6" data-price="1320"><span>6 Месяцев</span> <b>1320 ₽</b></div>
            <div class="premium-option" data-months="12" data-price="2400"><span>12 Месяцев</span> <b>2400 ₽</b></div>
            <div class="price-display"><span id="res-prem">0 ₽</span></div>
        </div>

        <div id="profile-section" class="section">
            <div class="status-row">
                <span>👤 <span id="profile-name">Загрузка...</span></span>
                <span id="status-badge"></span>
            </div>
            <div class="balance-card">
                <h3>🏦 S-COINS БАЛАНС</h3>
                <div class="balance-amount" id="balance-display">0</div>
                <div style="font-size: 11px;">За покупки бонус вручную</div>
            </div>
            <button class="btn btn-main" id="daily-bonus-btn">🎁 ЕЖЕДНЕВНЫЙ БОНУС (+10)</button>
            <div id="bonus-timer" style="font-size:11px; text-align:center;"></div>
            <div style="border-top:1px solid var(--border); margin:15px 0; padding-top:12px;">
                <h4>🎲 КОИНФЛИП</h4>
                <input type="number" id="bet-amount" placeholder="Ставка (S-Coins)">
                <div class="flip-options"><div class="flip-choice" data-choice="0">🦅 ОРЁЛ</div><div class="flip-choice" data-choice="1">🪙 РЕШКА</div></div>
                <button class="btn btn-main" id="flip-btn">КИНУТЬ МОНЕТКУ</button>
                <div id="flip-result"></div>
            </div>
        </div>

        <div class="pros-box">
            <div><b>⚡</b> Быстрая выдача</div>
            <div><b>🔒</b> 100% Безопасность</div>
            <div><b>⭐</b> Гарантия от блокировок</div>
        </div>

        <button class="btn btn-main" id="pay-btn" disabled>Оформить заказ</button>
        <a href="https://t.me/saylarreviews" style="display:block; text-align:center; color:var(--accent); margin-top:20px;" target="_blank">ОТЗЫВЫ</a>
    </div>
</div>

<!-- Модалки те же -->
<div id="modal" class="modal-overlay">...</div>
<div id="success-modal" class="modal-overlay">...</div>
<div id="toast-msg" class="toast-msg"></div>

<script>
    (function() {
        // ---------- SUPABASE ----------
        const SUPABASE_URL = 'https://eyxtqtvwexzcpshkifgh.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RTtYTn3hVWbAGBXTjkVX3w_Laj4jGG7';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ---------- ПОЛУЧАЕМ ДАННЫЕ ИЗ TELEGRAM ----------
        let tgUser = null;
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe) {
            tgUser = window.Telegram.WebApp.initDataUnsafe.user;
        }
        
        if (!tgUser || !tgUser.id) {
            // Если запущено не в Telegram или нет данных
            document.body.innerHTML = '<div style="padding:40px; text-align:center;">❌ Пожалуйста, откройте приложение через Telegram</div>';
            return;
        }
        
        const telegramId = tgUser.id;
        let displayName = tgUser.username || (tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : ''));
        if (!displayName) displayName = `User${telegramId}`;
        
        // Глобальное состояние
        let currentUser = null; // { telegram_id, display_name, coins, last_bonus, status }
        let currentMode = 'stars';
        let selectedPremiumMonths = 0, selectedPremiumPrice = 0, totalSum = 0;
        const RATE = 1.4;
        let selectedFlipChoice = null;
        
        // DOM элементы
        const profileNameSpan = document.getElementById('profile-name');
        const statusBadgeSpan = document.getElementById('status-badge');
        const balanceSpan = document.getElementById('balance-display');
        const dailyBonusBtn = document.getElementById('daily-bonus-btn');
        const bonusTimerDiv = document.getElementById('bonus-timer');
        const starsInput = document.getElementById('stars-input');
        const rubInput = document.getElementById('rub-input');
        const resStarsSpan = document.getElementById('res-stars');
        const resPremSpan = document.getElementById('res-prem');
        const payBtn = document.getElementById('pay-btn');
        const mainCard = document.getElementById('main-card');
        const modal = document.getElementById('modal');
        const modalSumSpan = document.getElementById('modal-sum');
        const confirmBtn = document.getElementById('confirm-btn');
        const successModal = document.getElementById('success-modal');
        const betAmount = document.getElementById('bet-amount');
        const flipResult = document.getElementById('flip-result');
        
        function showToast(msg) {
            const toast = document.getElementById('toast-msg');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }
        
        // Загрузка/создание пользователя по telegram_id
        async function loadOrCreateUser() {
            try {
                // Ищем пользователя
                let { data, error } = await sb
                    .from('users')
                    .select('*')
                    .eq('telegram_id', telegramId)
                    .maybeSingle();
                
                if (error) throw error;
                
                if (data) {
                    currentUser = {
                        telegram_id: data.telegram_id,
                        display_name: data.display_name,
                        coins: data.coins,
                        last_bonus: data.last_bonus,
                        status: data.status
                    };
                } else {
                    // Создаём нового
                    const newUser = {
                        telegram_id: telegramId,
                        display_name: displayName,
                        coins: 0,
                        last_bonus: null,
                        status: 'user'
                    };
                    const { data: inserted, error: insertError } = await sb
                        .from('users')
                        .insert([newUser])
                        .select()
                        .single();
                    if (insertError) throw insertError;
                    currentUser = {
                        telegram_id: inserted.telegram_id,
                        display_name: inserted.display_name,
                        coins: inserted.coins,
                        last_bonus: inserted.last_bonus,
                        status: inserted.status
                    };
                }
                updateProfileUI();
                updateBonusUI();
            } catch (err) {
                console.error(err);
                showToast('Ошибка авторизации. Перезагрузите.');
            }
        }
        
        function updateProfileUI() {
            if (!currentUser) return;
            profileNameSpan.innerText = currentUser.display_name;
            // статус
            let statusText = '', statusClass = '';
            switch (currentUser.status) {
                case 'owner': statusText = '👑 ВЛАДЕЛЕЦ'; statusClass = 'owner-badge'; break;
                case 'vip': statusText = '💎 VIP'; statusClass = 'owner-badge'; break;
                case 'frequent': statusText = '🔥 ЧАСТЫЙ КЛИЕНТ'; statusClass = 'owner-badge'; break;
                default: statusText = '👤 Обычный юзер'; statusClass = '';
            }
            statusBadgeSpan.innerHTML = `<span class="${statusClass}" style="background:${currentUser.status === 'owner' ? 'linear-gradient(135deg,#fbbf24,#f59e0b)' : '#1e293b'}; padding:4px 12px; border-radius:30px; font-size:12px;">${statusText}</span>`;
            balanceSpan.innerText = currentUser.coins;
        }
        
        function updateBonusUI() {
            if (!currentUser) return;
            const today = new Date().toISOString().slice(0,10);
            if (currentUser.last_bonus === today) {
                dailyBonusBtn.disabled = true;
                dailyBonusBtn.style.opacity = '0.6';
                dailyBonusBtn.innerText = "✅ БОНУС ПОЛУЧЕН СЕГОДНЯ";
                bonusTimerDiv.innerText = "Завтра будет новый";
            } else {
                dailyBonusBtn.disabled = false;
                dailyBonusBtn.style.opacity = '1';
                dailyBonusBtn.innerText = "🎁 ЕЖЕДНЕВНЫЙ БОНУС (+10 S-Coins)";
                bonusTimerDiv.innerText = "Доступен!";
            }
        }
        
        async function updateUserInDB(updates) {
            if (!currentUser) return false;
            try {
                const { error } = await sb
                    .from('users')
                    .update(updates)
                    .eq('telegram_id', currentUser.telegram_id);
                if (error) throw error;
                if (updates.coins !== undefined) currentUser.coins = updates.coins;
                if (updates.last_bonus !== undefined) currentUser.last_bonus = updates.last_bonus;
                if (updates.display_name !== undefined) currentUser.display_name = updates.display_name;
                if (updates.status !== undefined) currentUser.status = updates.status;
                updateProfileUI();
                updateBonusUI();
                return true;
            } catch (err) {
                console.error(err);
                showToast('Ошибка сохранения');
                return false;
            }
        }
        
        async function claimDailyBonus() {
            if (!currentUser) return;
            const today = new Date().toISOString().slice(0,10);
            if (currentUser.last_bonus === today) {
                showToast("Уже получали сегодня");
                return;
            }
            const newCoins = currentUser.coins + 10;
            await updateUserInDB({ coins: newCoins, last_bonus: today });
            showToast("+10 S-Coins!");
        }
        
        async function placeFlipBet() {
            if (!currentUser) { showToast("Ошибка"); return; }
            let bet = parseInt(betAmount.value);
            if (isNaN(bet) || bet <= 0) { showToast("Ставка >0"); return; }
            if (bet > currentUser.coins) { showToast("Не хватает монет"); return; }
            if (selectedFlipChoice === null) { showToast("Выберите орёл/решку"); return; }
            const result = Math.random() < 0.5 ? 0 : 1;
            const win = (result === selectedFlipChoice);
            const resultText = result === 0 ? "ОРЁЛ" : "РЕШКА";
            let newCoins = currentUser.coins;
            if (win) newCoins += bet;
            else newCoins -= bet;
            await updateUserInDB({ coins: newCoins });
            flipResult.innerHTML = `<span style="color:${win ? '#10b981' : '#ef4444'}">${win ? 'Выигрыш!' : 'Проигрыш...'} Выпал ${resultText}</span>`;
            betAmount.value = '';
            showToast(win ? `+${bet} монет` : `-${bet} монет`);
        }
        
        // Логика магазина (как раньше)
        function validateAndCalculate() {
            if (currentMode === 'stars') {
                let rub = parseInt(rubInput.value);
                totalSum = (rub >= 70) ? rub : 0;
                resStarsSpan.innerText = totalSum + " ₽";
                payBtn.disabled = !(totalSum >= 70);
            } else if (currentMode === 'premium') {
                payBtn.disabled = !(selectedPremiumPrice > 0);
            }
            if (!payBtn.disabled && currentMode !== 'profile') {
                mainCard.classList.add('neon-ready');
            } else {
                mainCard.classList.remove('neon-ready');
            }
        }
        
        function calcFromStars() {
            let stars = parseInt(starsInput.value);
            if (!isNaN(stars) && stars > 0) rubInput.value = Math.ceil(stars * RATE);
            else rubInput.value = '';
            validateAndCalculate();
        }
        function calcFromRub() {
            let rub = parseInt(rubInput.value);
            if (!isNaN(rub) && rub > 0) starsInput.value = Math.floor(rub / RATE);
            else starsInput.value = '';
            validateAndCalculate();
        }
        function selectPremium(months, price, el) {
            selectedPremiumMonths = months;
            selectedPremiumPrice = price;
            document.querySelectorAll('.premium-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            resPremSpan.innerText = price + " ₽";
            validateAndCalculate();
        }
        function openPay() {
            if (currentMode === 'stars') totalSum = parseInt(rubInput.value) || 0;
            else totalSum = selectedPremiumPrice;
            if (totalSum < 70 && currentMode === 'stars') return;
            if (totalSum <= 0) return;
            modalSumSpan.innerText = totalSum + " ₽";
            modal.classList.add('active');
        }
        function closePay() { modal.classList.remove('active'); }
        function finishOrder() {
            confirmBtn.disabled = true;
            confirmBtn.innerText = "ОТПРАВКА...";
            let itemDesc = '';
            if (currentMode === 'stars') itemDesc = starsInput.value + " звёзд";
            else itemDesc = "Премиум (" + selectedPremiumMonths + " мес.)";
            const msg = `💎 НОВЫЙ ЗАКАЗ (ОЖИДАЕТ ПРОВЕРКИ)\n👤 ${currentUser.display_name} (tg:${telegramId})\n📦 ${itemDesc}\n💵 ${totalSum} ₽`;
            const token = '8752951278:AAHkJDobhtUhxKgwsPhyH4qMfAVwtkQH0wo';
            const chatId = '1717982615';
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`)
                .then(() => {
                    modal.classList.remove('active');
                    successModal.classList.add('active');
                })
                .catch(() => alert("Ошибка отправки"))
                .finally(() => { confirmBtn.disabled = false; confirmBtn.innerText = "Я ОПЛАТИЛ"; });
        }
        function closeAll() {
            successModal.classList.remove('active');
            if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.close();
        }
        
        function switchTab(tabId) {
            currentMode = tabId;
            document.querySelectorAll('.tab').forEach(tab => {
                if (tab.getAttribute('data-tab') === tabId) tab.classList.add('active');
                else tab.classList.remove('active');
            });
            document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
            document.getElementById(tabId + '-section').classList.add('active');
            if (tabId === 'profile') {
                payBtn.classList.add('hidden-pay-btn');
                updateProfileUI();
                updateBonusUI();
            } else {
                payBtn.classList.remove('hidden-pay-btn');
                validateAndCalculate();
            }
        }
        
        // Инициализация
        async function init() {
            if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.expand();
            // Загружаем пользователя
            await loadOrCreateUser();
            // Обработчики
            starsInput.addEventListener('input', calcFromStars);
            rubInput.addEventListener('input', calcFromRub);
            document.querySelectorAll('.premium-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    selectPremium(parseInt(opt.dataset.months), parseInt(opt.dataset.price), opt);
                });
            });
            payBtn.addEventListener('click', openPay);
            confirmBtn.addEventListener('click', finishOrder);
            document.querySelectorAll('.close-btn').forEach(btn => btn.addEventListener('click', closePay));
            document.getElementById('close-success')?.addEventListener('click', closeAll);
            dailyBonusBtn.addEventListener('click', claimDailyBonus);
            document.getElementById('flip-btn').addEventListener('click', placeFlipBet);
            document.querySelectorAll('.flip-choice').forEach(choice => {
                choice.addEventListener('click', () => {
                    document.querySelectorAll('.flip-choice').forEach(c => c.classList.remove('selected'));
                    choice.classList.add('selected');
                    selectedFlipChoice = parseInt(choice.dataset.choice);
                });
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.tab));
            });
            // Устанавливаем стартовую вкладку
            switchTab('stars');
        }
        init();
    })();
</script>
</body>
</html>
