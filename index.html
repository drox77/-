<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAYLAR | Premium Agency</title>
    <!-- Premium Font: Cinzel for high-end luxury feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505; /* Deep charcoal/black base */
            overflow-x: hidden;
            font-family: 'Cinzel', serif;
        }

        /* --- HERO CONTAINER --- */
        .hero-section {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- BACKGROUND & WATERMARK INTEGRATION --- */
        /* Slowly zooming background to act as the integrated file/watermark */
        .hero-bg {
            position: absolute;
            inset: -5%; /* Prevent edge clipping during zoom */
            width: 110%;
            height: 110%;
            /* Replace the URL below with your provided image/logo path */
            background-image: url('https://images.unsplash.com/photo-1600164318858-6932463e26bb?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%);
            opacity: 0.15; /* Subtle watermark blending */
            z-index: 1;
            animation: slowZoom 25s linear infinite alternate;
        }

        /* Transparent dark gradient overlay for content readability */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
            /* Very subtle glassmorphism to remove hard edges and blend the background */
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 2;
        }

        /* --- PARTICLES CANVAS --- */
        #luxury-rays {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none; /* Let clicks pass through */
        }

        /* --- TYPOGRAPHY & ANIMATION --- */
        .hero-title {
            position: relative;
            z-index: 4;
            color: #ffffff;
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: default;
            user-select: none;
            
            /* Initial state for cinematic reveal */
            opacity: 0;
            transform: scale(0.9);
            filter: blur(12px);
            
            /* Reveal Animation */
            animation: cinematicReveal 2.2s cubic-bezier(0.19, 1, 0.22, 1) 0.3s forwards;
            
            /* Smooth transition for hover shimmer */
            transition: text-shadow 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), color 0.6s ease;
        }

        /* Luxurious, colorless shimmer on hover */
        .hero-title:hover {
            color: #fcfcfc;
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.4), 
                0 0 40px rgba(255, 255, 255, 0.2), 
                0 0 80px rgba(255, 255, 255, 0.1);
        }

        /* --- KEYFRAMES --- */
        @keyframes cinematicReveal {
            0% {
                opacity: 0;
                transform: scale(0.9);
                filter: blur(12px);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0px);
            }
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        
        /* Optional mock content below to show scrolling */
        .content-placeholder {
            height: 100vh;
            background: #050505;
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <!-- 1. Integrated Watermark / Background File -->
        <div class="hero-bg"></div>
        
        <!-- 2. Dark Transparent Overlay & Glass Blur -->
        <div class="hero-overlay"></div>
        
        <!-- 3. Cinematic Outward Rays Canvas -->
        <canvas id="luxury-rays"></canvas>
        
        <!-- 4. Centered Brand Name -->
        <h1 class="hero-title">SAYLAR</h1>
    </header>

    <!-- Underlying page content begins here -->
    <main class="content-placeholder"></main>

    <script>
        /**
         * Premium Light Rays Effect (Vanilla JS + HTML5 Canvas)
         * Creates elegant, transparent grayscale lines that ripple outward from the center.
         */
        const canvas = document.getElementById('luxury-rays');
        const ctx = canvas.getContext('2d');
        
        let width, height, cx, cy;
        let rays = [];
        const RAY_COUNT = 80; // Number of simultaneous rays

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cx = width / 2;
            cy = height / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        class Ray {
            constructor() {
                this.init();
                // Randomize initial states so they don't all spawn at once
                this.distance = Math.random() * (Math.max(width, height) / 2);
            }

            init() {
                this.angle = Math.random() * Math.PI * 2;
                // Start slightly away from the exact center
                this.distance = Math.random() * 50 + 20; 
                this.length = Math.random() * 150 + 50;
                this.speed = Math.random() * 1.5 + 0.3;
                
                this.alpha = 0;
                // Subtle grayscale transparency max limit
                this.maxAlpha = Math.random() * 0.15 + 0.02; 
                this.fadeRate = Math.random() * 0.005 + 0.002;
                
                this.state = 'fadingIn'; // fadingIn, active, fadingOut
            }

            update() {
                // Move outward
                this.distance += this.speed;

                // Handle fade in / out
                if (this.state === 'fadingIn') {
                    this.alpha += this.fadeRate;
                    if (this.alpha >= this.maxAlpha) {
                        this.state = 'fadingOut';
                    }
                } else if (this.state === 'fadingOut') {
                    this.alpha -= this.fadeRate;
                    if (this.alpha <= 0) {
                        this.init(); // Reset and respawn at center once faded out
                    }
                }
            }

            draw() {
                // Calculate start and end points based on angle and distance
                const x1 = cx + Math.cos(this.angle) * this.distance;
                const y1 = cy + Math.sin(this.angle) * this.distance;
                const x2 = cx + Math.cos(this.angle) * (this.distance + this.length);
                const y2 = cy + Math.sin(this.angle) * (this.distance + this.length);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                
                // Pure grayscale stroke
                ctx.strokeStyle = `rgba(255, 255, 255, ${Math.max(0, this.alpha)})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        // Initialize rays
        for (let i = 0; i < RAY_COUNT; i++) {
            rays.push(new Ray());
        }

        // Animation loop
        function animate() {
            // Clear canvas completely each frame for sharp, clean rendering
            ctx.clearRect(0, 0, width, height);
            
            rays.forEach(ray => {
                ray.update();
                ray.draw();
            });
            
            requestAnimationFrame(animate);
        }

        // Start animation
        animate();
    </script>
</body>
</html>
