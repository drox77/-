<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAYLAR Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #10b981; 
            --accent-glow: rgba(16, 185, 129, 0.4);
            --bg-black: #020617;
            --border: rgba(255, 255, 255, 0.15);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-black);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.3;
            animation: float 6s infinite alternate ease-in-out;
        }
        .shape-1 { width: 250px; height: 250px; background: var(--accent); top: -50px; left: -50px; }
        .shape-2 { width: 300px; height: 300px; background: #0ea5e9; bottom: -50px; right: -50px; }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(20px, 30px); }
        }

        .container { width: 100%; max-width: 380px; }

        .card {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card.neon { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        h2 { text-align: center; margin: 0 0 20px 0; letter-spacing: 2px; }

        .tabs { display: flex; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; font-weight: 800; font-size: 12px; color: var(--text-dim); cursor: pointer; }
        .tab.active { background: var(--accent); color: #000; }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        label { display: block; margin-bottom: 6px; font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }

        .premium-option { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 14px; display: flex; justify-content: space-between; margin-bottom: 8px; cursor: pointer; }
        .premium-option.selected { border-color: var(--accent); background: rgba(16, 185, 129, 0.1); }

        .price { text-align: center; font-size: 32px; font-weight: 900; color: var(--accent); margin: 15px 0; }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 14px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-main { background: var(--accent); color: #000; }
        .btn-main:disabled { opacity: 0.2; cursor: not-allowed; }

        .pay-ui { display: none; text-align: center; }
        .bank-box { background: #000; padding: 15px; border-radius: 15px; margin: 15px 0; border: 1px solid var(--accent); color: var(--accent); font-family: monospace; }
    </style>
</head>
<body>

<div class="bg-shape shape-1"></div>
<div class="bg-shape shape-2"></div>

<div class="container">
    <div class="card" id="card">
        
        <div id="shop-ui">
            <h2>SAYLAR SHOP</h2>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('stars', this)">ЗВЁЗДЫ</div>
                <div class="tab" onclick="switchTab('premium', this)">PREMIUM</div>
            </div>

            <label>Твой никнейм</label>
            <input type="text" id="user" placeholder="@nickname" oninput="check()">

            <div id="stars-sec" class="section active">
                <input type="number" id="s-in" placeholder="Кол-во звёзд" oninput="calcS()">
                <div class="price" id="p-stars">0 ₽</div>
            </div>

            <div id="prem-sec" class="section">
                <div class="premium-option" onclick="setP(3, 1000, this)"><span>3 Месяца</span> <b>1000 ₽</b></div>
                <div class="premium-option" onclick="setP(6, 1320, this)"><span>6 Месяцев</span> <b>1320 ₽</b></div>
                <div class="premium-option" onclick="setP(12, 2400, this)"><span>12 Месяцев</span> <b>2400 ₽</b></div>
                <div class="price" id="p-prem">0 ₽</div>
            </div>

            <button class="btn btn-main" id="go" onclick="showPay()" disabled>Заказать</button>
        </div>

        <div id="pay-ui" class="pay-ui">
            <h3 style="margin:0">К ОПЛАТЕ:</h3>
            <div class="price" id="f-sum">0 ₽</div>
            <div class="bank-box">2200 7019 4219 4652<br>+7 966 349 22 74</div>
            <p style="font-size:12px; color:var(--text-dim)">Получатель: Дамир О.</p>
            <button class="btn btn-main" id="done" onclick="send()">Я ОПЛАТИЛ</button>
            <button style="background:none; border:none; color:var(--text-dim); margin-top:15px; cursor:pointer;" onclick="hidePay()">← Назад</button>
        </div>

    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Развернуть на весь экран

    let mode = 'stars', sum = 0, premM = 0, premP = 0;

    function switchTab(t, el) {
        mode = t;
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(t + '-sec').classList.add('active');
        check();
    }

    function calcS() {
        let val = document.getElementById('s-in').value;
        sum = val >= 50 ? Math.ceil(val * 1.4) : 0;
        document.getElementById('p-stars').innerText = sum + " ₽";
        check();
    }

    function setP(m, p, el) {
        premM = m; premP = p; sum = p;
        document.querySelectorAll('.premium-option').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('p-prem').innerText = p + " ₽";
        check();
    }

    function check() {
        let u = document.getElementById('user').value;
        let isOk = u.length > 2 && sum > 0 && !/[а-яА-Я]/.test(u);
        document.getElementById('go').disabled = !isOk;
        document.getElementById('card').classList.toggle('neon', isOk);
    }

    function showPay() {
        document.getElementById('shop-ui').style.display = 'none';
        document.getElementById('pay-ui').style.display = 'block';
        document.getElementById('f-sum').innerText = sum + " ₽";
    }

    function hidePay() {
        document.getElementById('shop-ui').style.display = 'block';
        document.getElementById('pay-ui').style.display = 'none';
    }

    function send() {
        const btn = document.getElementById('done');
        btn.disabled = true;
        btn.innerText = "ОТПРАВКА...";

        const token = '8752951278:AAHkJDobhtUhxKgwsPhyH4qMfAVwtkQH0wo';
        const chat = '1717982615';
        const user = document.getElementById('user').value;
        let prod = mode === 'stars' ? document.getElementById('s-in').value + ' звёзд' : 'Премиум ' + premM + ' мес.';

        const text = `💰 НОВЫЙ ЗАКАЗ!\n👤 Клиент: ${user}\n📦 Товар: ${prod}\n💵 Сумма: ${sum} ₽`;

        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(text)}`)
        .then(() => {
            tg.showAlert('Заказ отправлен! Ожидайте.', () => {
                tg.close(); // Закрыть приложение после оплаты
            });
        });
    }
</script>
</body>
</html>
